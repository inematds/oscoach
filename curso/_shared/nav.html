<!--
  oscoach · NAV CANÔNICO (copiar VERBATIM em TODA página) — Erro Crítico #13
  =========================================================================
  TODAS as páginas (landing + índices de trilha + módulos) usam ESTE nav, idêntico:
    Logo (🧠 + AIOS, text-yellow-400) · | · INEMA.CLUB (text-sky-400)
    + 5 botões de trilha (Fundamentos·Emerald, Técnica I·Blue, Técnica II·Purple,
      Passo a passo·Amber, Avançado·Teal)
    + "Minha jornada" (data-inema-journey-open) + "Aparência" (painel) + theme toggle.
  Nunca simplificar para "← Trilha X | Curso" nas páginas internas.

  -------------------------------------------------------------------------
  (a) COMO MARCAR A TRILHA ATIVA
  -------------------------------------------------------------------------
  Cada botão de trilha tem DOIS estados de classe. Troque APENAS o botão da
  trilha da página atual:
    ATIVO   :  text-COR-400 bg-COR-500/10
    INATIVO :  text-neutral-400 hover:text-COR-400 hover:bg-COR-500/10 transition-colors
  (COR = emerald|blue|purple|amber|teal conforme a trilha). Esta cópia mostra a
  TRILHA 1 (Fundamentos) ativa — nas demais páginas, ative o botão correspondente.

  -------------------------------------------------------------------------
  (b) COMO AJUSTAR OS CAMINHOS RELATIVOS POR PROFUNDIDADE
  -------------------------------------------------------------------------
  Só DOIS contextos de profundidade existem:

    LANDING (index.html na RAIZ do curso):
      • Logo  href="index.html"
      • Trilhas  href="curso/trilha1/index.html" … "curso/trilha5/index.html"
        (nenhuma ativa na landing — todas no estado INATIVO)

    ÍNDICE DE TRILHA e MÓDULO (qualquer arquivo em curso/trilhaN/):
      • Logo  href="../../index.html"
      • Trilha da página atual (ATIVA):  href="index.html"        (mesma pasta)
      • Outras trilhas (INATIVAS):       href="../trilhaM/index.html"
      (Os módulos curso/trilhaN/modulo-N-Y.html têm a MESMA profundidade do índice
       da trilha — usam os mesmos caminhos.)

  Esta cópia abaixo está na profundidade ÍNDICE/MÓDULO (../../ e ../trilhaM/),
  com a Trilha 1 ativa apontando para index.html.

  -------------------------------------------------------------------------
  (c) PRÉ-REQUISITO p/ a "Aparência" funcionar (§12.3 do MASTER)
  -------------------------------------------------------------------------
  O gatilho data-inema-appearance-toggle="#inema-appearance-panel" SÓ funciona se o
  PAINEL #inema-appearance-panel[data-inema-appearance] estiver presente (incluído
  aqui). O painel é position:absolute → o container do par (gatilho+painel) é relative.
-->
